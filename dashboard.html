<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard - MLM Attendance</title>
    
    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Linked to the new dedicated Dashboard CSS file -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="navbar">
        <h1>MLM LOGO</h1>
        <button id="logoutBtn" class="logout-btn">Log out</button>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        
        <div class="form-card">
            <div class="form-header">
                <h2>Attendance Form</h2>
                <p>Please confirm your details and select your schedule.</p>
            </div>

            <!-- Pre-filled Details -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" readonly>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" readonly>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" readonly>
            </div>

            <!-- Selectable Details -->
            <div class="form-group">
                <label>Organization</label>
                <div class="select-wrapper">
                    <select id="organization" required onchange="this.blur()">
                        <option value="" disabled selected>Select Organization</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Schedule / Meeting</label>
                <div class="select-wrapper">
                    <select id="schedule" required onchange="this.blur()">
                        <option value="" disabled selected>Select Schedule</option>
                    </select>
                </div>
            </div>

            <!-- Submit Action -->
            <button id="submitAttendance" class="submit-btn">
                Submit Attendance
            </button>
        </div>

    </main>

    <!-- Premium Toast Notification -->
    <div id="toast" class="toast">
        <div class="toast-icon" id="toastIcon"></div>
        <div class="toast-message" id="toastMessage">Message goes here</div>
    </div>

    <!-- Supabase and Logic Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/conf.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/orgs.js"></script>
    <script src="js/meetings.js"></script>
    <script src="js/dashboard.js"></script>

</body>
</html>
