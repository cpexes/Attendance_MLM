<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MLM</title>
    
    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="navbar">
        <h1>Admin Dashboard</h1>
        <button id="logoutBtn" class="logout-btn">Log out</button>
    </nav>

    <!-- Main Content Grid -->
    <main class="admin-container">
        
        <!-- Dashboard Statistics -->
        <section>
            <h2 class="section-title">Overview Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Records</h3>
                    <h2 id="totalRecords">0</h2>
                </div>
                <div class="stat-card">
                    <h3>Present</h3>
                    <h2 id="presentCount">0</h2>
                </div>
                <div class="stat-card">
                    <h3>Late</h3>
                    <h2 id="lateCount">0</h2>
                </div>
                <div class="stat-card">
                    <h3>Current Organization</h3>
                    <h2 id="organizationCount">All</h2>
                </div>
            </div>
        </section>

        <!-- Attendance Records -->
        <section class="card">
            <div class="section-header">
                <h2 class="section-title">Attendance Records</h2>
                <div class="action-buttons">
                    <button id="exportCsvBtn" class="btn btn-outline">Export CSV</button>
                    <button id="clearAttendanceBtn" class="btn btn-danger">Clear Records</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-bar">
                <div class="filter-group">
                    <label>Search Name</label>
                    <input type="text" id="searchBox" placeholder="Search records...">
                </div>
                <div class="filter-group">
                    <label>Organization</label>
                    <div class="select-wrapper">
                        <select id="organizationFilter" onchange="this.blur()"><option value="">All</option></select>
                    </div>
                </div>
                <div class="filter-group">
                    <label>Date</label>
                    <div class="select-wrapper">
                        <select id="dateFilter" onchange="this.blur()"><option value="">All</option></select>
                    </div>
                </div>
                <div class="filter-group">
                    <label>Schedule</label>
                    <div class="select-wrapper">
                        <select id="scheduleFilter" onchange="this.blur()"><option value="">All</option></select>
                    </div>
                </div>
                <div class="filter-group">
                    <label>Remarks</label>
                    <div class="select-wrapper">
                        <select id="remarksFilter" onchange="this.blur()"><option value="">All</option></select>
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="table-container">
                <table id="attendanceTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Organization</th>
                            <th>Date</th>
                            <th>Schedule</th>
                            <th>Time In</th>
                            <th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Meeting Management -->
        <section class="card">
            <h2 class="section-title">Meeting Management</h2>
            
            <div class="meeting-layout">
                <!-- Create/Edit Form -->
                <div class="meeting-form-wrapper">
                    <h3 id="meetingFormTitle" class="section-title" style="font-size: 15px; margin-bottom: 16px;">Create Meeting</h3>
                    <div id="meetingForm" class="form-grid">
                        <div class="filter-group">
                            <label>Meeting Name</label>
                            <input type="text" id="meetingName" placeholder="Enter meeting name">
                        </div>
                        <div class="filter-group">
                            <label>Start Time</label>
                            <input type="time" id="meetingStart">
                        </div>
                        <div class="filter-group">
                            <label>Cutoff Time</label>
                            <input type="time" id="meetingCutoff">
                        </div>
                        <div class="form-actions">
                            <button id="createMeetingBtn" class="btn btn-primary">Create</button>
                            <button id="clearMeetingBtn" class="btn btn-outline">Clear</button>
                        </div>
                    </div>
                </div>

                <!-- Active Meetings Table -->
                <div class="table-container">
                    <table id="meetingsTable">
                        <thead>
                            <tr>
                                <th>Meeting Name</th>
                                <th>Start Time</th>
                                <th>Cutoff Time</th>
                                <th>Active</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/conf.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/table.js"></script>
    <script src="js/filtering.js"></script>
    <script src="js/admin_data.js"></script>
    <script src="js/manage_meetings.js"></script>
    <script src="js/export.js"></script>
    <script src="js/admin_actions.js"></script>
    <script src="js/admin.js"></script>

</body>
</html>
